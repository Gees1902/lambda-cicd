
name: Deploy AWS Lambda

on:
  push:
    branches:
      - main
    paths:
      - 'lambda/' # Trigger the workflow only when files in the lambda directory are changed


jobs:
  deploy-lambda:
    runs-on: ubuntu-latest #Set the runner to use the latest version of Ubuntu
    steps:
    - uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.12'

    - name: Install dependencies # Install the dependencies specified in the requirements.txt file
      run: |
        python -m pip install --upgrade pip
        pip install -r lambda/requirements.txt -t lambda/

    - name: Configure AWS credentials # Sets up our AWS credentials using the secrets stored in GitHub
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-2

    - name: Deploy Lambda Function
      run: |
        cd lambda
        zip -r function.zip .
        aws lambda update-function-code --function-name my-test-cicd-lambda --zip-file fileb://lambda.zip
